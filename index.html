<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar of the Week</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Baloo 2', cursive;
      overflow: hidden;
      position: relative;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0.4;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    /* Confetti */
    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      top: -20px;
      animation: confetti-fall linear infinite;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-10px) rotateZ(0deg) rotateX(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotateZ(720deg) rotateX(360deg); opacity: 0.3; }
    }

    .container {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 20px;
    }

    /* Title */
    .title {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(90deg, #f9d423, #ff4e50, #f9d423);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
      margin-bottom: 10px;
      text-shadow: none;
      filter: drop-shadow(0 2px 10px rgba(249, 212, 35, 0.3));
    }
    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 50px;
    }

    /* Trophy emoji bounce */
    .trophy {
      display: inline-block;
      animation: bounce 1s ease infinite;
      font-size: 3rem;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    /* Podium layout */
    .podium-wrapper {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0;
    }

    .podium-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Avatar circle */
    .avatar-wrapper {
      position: relative;
      margin-bottom: 16px;
      animation: avatar-enter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .podium-slot:nth-child(1) .avatar-wrapper { animation-delay: 0.4s; }
    .podium-slot:nth-child(2) .avatar-wrapper { animation-delay: 0.2s; }
    .podium-slot:nth-child(3) .avatar-wrapper { animation-delay: 0.6s; }

    @keyframes avatar-enter {
      0% { transform: scale(0) translateY(60px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      position: relative;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      border: 4px solid rgba(255,255,255,0.3);
      overflow: hidden;
      background: #1a1a2e;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    /* First place - bigger avatar */
    .first .avatar {
      width: 140px;
      height: 140px;
      border-color: #ffd700;
      border-width: 5px;
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.4), 0 8px 30px rgba(0,0,0,0.4);
    }

    /* Crown for 1st place */
    .crown {
      position: absolute;
      top: -28px;
      font-size: 2rem;
      animation: crown-wobble 2s ease-in-out infinite;
      filter: drop-shadow(0 2px 6px rgba(255,215,0,0.6));
    }
    @keyframes crown-wobble {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }

    /* Glow ring for 1st */
    .glow-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 3px solid rgba(255, 215, 0, 0.5);
      animation: pulse-ring 2s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .name {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .first .name {
      font-size: 1.4rem;
      color: #ffd700;
    }

    /* Podium blocks */
    .podium-block {
      width: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 800;
      color: rgba(255,255,255,0.2);
      border-radius: 12px 12px 0 0;
      position: relative;
      overflow: hidden;
      animation: podium-rise 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .podium-slot:nth-child(1) .podium-block { animation-delay: 0.5s; }
    .podium-slot:nth-child(2) .podium-block { animation-delay: 0.1s; }
    .podium-slot:nth-child(3) .podium-block { animation-delay: 0.7s; }

    @keyframes podium-rise {
      0% { max-height: 0; padding: 0; }
      100% { max-height: 300px; }
    }

    .podium-block::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
    }

    /* 2nd place (left) */
    .second .podium-block {
      height: 140px;
      background: linear-gradient(180deg, #7f8c8d, #606d70);
    }

    /* 1st place (center) */
    .first .podium-block {
      height: 200px;
      background: linear-gradient(180deg, #f1c40f, #d4a500);
    }

    /* 3rd place (right) */
    .third .podium-block {
      height: 100px;
      background: linear-gradient(180deg, #cd7f32, #a0622a);
    }

    .rank {
      position: relative;
      z-index: 2;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    /* Stars */
    .stars {
      position: absolute;
      top: -10px;
      display: flex;
      gap: 2px;
      font-size: 0.8rem;
    }
    .stars span {
      animation: star-twinkle 1.5s ease-in-out infinite;
    }
    .stars span:nth-child(2) { animation-delay: 0.3s; }
    .stars span:nth-child(3) { animation-delay: 0.6s; }
    @keyframes star-twinkle {
      0%, 100% { opacity: 0.4; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* Base/floor */
    .floor {
      width: 500px;
      height: 6px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      border-radius: 3px;
      margin-top: 0;
      position: relative;
      z-index: 5;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .title { font-size: 2rem; }
      .podium-block { width: 110px; }
      .avatar { width: 80px; height: 80px; font-size: 2.2rem; }
      .first .avatar { width: 105px; height: 105px; font-size: 3rem; }
      .floor { width: 370px; }
    }
  </style>
</head>
<body>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <!-- Confetti -->
  <div class="confetti" id="confetti"></div>

  <div class="container">
    <div class="trophy">🏆</div>
    <h1 class="title">The Avatar of the Week</h1>
    <p class="subtitle">— hall of fame —</p>

    <div class="podium-wrapper">
      <!-- 2nd Place — Ben (left) -->
      <div class="podium-slot second">
        <div class="avatar-wrapper">
          <div class="stars"><span>⭐</span><span>⭐</span></div>
          <div class="avatar"><img src="images/ben.png" alt="Ben"></div>
        </div>
        <div class="name">Ben</div>
        <div class="podium-block">
          <span class="rank">2</span>
        </div>
      </div>

      <!-- 1st Place — Maya (center) -->
      <div class="podium-slot first">
        <div class="avatar-wrapper">
          <span class="crown">👑</span>
          <div class="glow-ring"></div>
          <div class="stars"><span>⭐</span><span>⭐</span><span>⭐</span></div>
          <div class="avatar"><img src="images/maya.png" alt="Maya"></div>
        </div>
        <div class="name">Maya</div>
        <div class="podium-block">
          <span class="rank">1</span>
        </div>
      </div>

      <!-- 3rd Place — Harper (right) -->
      <div class="podium-slot third">
        <div class="avatar-wrapper">
          <div class="stars"><span>⭐</span></div>
          <div class="avatar"><img src="images/harper.png" alt="Harper"></div>
        </div>
        <div class="name">Harper</div>
        <div class="podium-block">
          <span class="rank">3</span>
        </div>
      </div>
    </div>

    <div class="floor"></div>
  </div>

  <script>
    // Generate floating particles
    const particlesEl = document.getElementById('particles');
    const colors = ['#f9d423', '#ff4e50', '#4facfe', '#a18cd1', '#00f2fe', '#fbc2eb'];
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 8 + 4;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (Math.random() * 8 + 6) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      particlesEl.appendChild(p);
    }

    // Generate confetti
    const confettiEl = document.getElementById('confetti');
    const confettiColors = ['#f9d423', '#ff4e50', '#4facfe', '#a18cd1', '#00f2fe', '#ff6b6b', '#fbc2eb', '#26de81'];
    for (let i = 0; i < 40; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + '%';
      c.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      c.style.animationDuration = (Math.random() * 4 + 3) + 's';
      c.style.animationDelay = (Math.random() * 6) + 's';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      c.style.width = (Math.random() * 8 + 5) + 'px';
      c.style.height = (Math.random() * 8 + 5) + 'px';
      c.style.transform = `rotate(${Math.random() * 360}deg)`;
      confettiEl.appendChild(c);
    }
  </script>
</body>
</html>
